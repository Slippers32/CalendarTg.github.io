<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>
    <style>
        :root {
            --bg-color: #181818;
            --container-bg: #242424;
            --text-color: #ffffff;
            --hint-color: #aaaaaa;
            --button-color: #3390ec;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background: var(--container-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 { text-align: center; margin-bottom: 20px; font-size: 1.2rem; }
        label { display: block; margin-bottom: 5px; color: var(--hint-color); font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #121212;
            color: white;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: var(--button-color); }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--button-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🗓 Новое напоминание</h2>
        
        <label>Что напомнить?</label>
        <input type="text" id="task_text" placeholder="Например: Покормить кота">
        
        <label>Когда?</label>
        <input type="text" id="date_picker" placeholder="Выберите дату и время">
        
        <button id="main_button">СОХРАНИТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Инициализация темного календаря
        flatpickr("#date_picker", {
            enableTime: true,
            dateFormat: "Y-m-d H:i",
            minDate: "today",
            locale: "ru",
            time_24hr: true
        });

        const btn = document.getElementById('main_button');
        btn.addEventListener('click', () => {
            const task = document.getElementById('task_text').value;
            const date = document.getElementById('date_picker').value;

            if (!task || !date) {
                tg.showAlert("Пожалуйста, заполни все поля!");
                return;
            }

            const data = JSON.stringify({ task: task, date: date });
            tg.sendData(data); // Отправка данных боту
        });
    </script>
</body>
</html>
