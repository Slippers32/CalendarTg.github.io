<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h3 { margin-top: 0; color: #3390ec; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3390ec; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .task-list { margin-top: 20px; }
        .task-item { background: #252525; padding: 12px; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid #3390ec; }
        .task-date { color: #888; font-size: 0.8rem; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>➕ Новое напоминание</h3>
        <input type="text" id="task_text" placeholder="Что напомнить?">
        <input type="text" id="date_picker" placeholder="Дата и время">
        <button onclick="saveTask()">СОХРАНИТЬ</button>
    </div>

    <h4>📋 Ваши задачи</h4>
    <div id="task_list" class="task-list">Загрузка...</div>

    <script>
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe.user?.id || 0;
        
        flatpickr("#date_picker", { 
            enableTime: true, 
            dateFormat: "Y-m-d H:i", 
            theme: "dark",
            minDate: "today" 
        });

        async function loadTasks() {
            const res = await fetch(`/tasks/${userId}`);
            const tasks = await res.json();
            const list = document.getElementById('task_list');
            list.innerHTML = tasks.length ? '' : '<p style="color: #666;">Задач пока нет</p>';
            tasks.forEach(t => {
                list.innerHTML += `<div class="task-item">
                    <div>${t.text}</div>
                    <div class="task-date">📅 ${t.date.replace('T', ' ')}</div>
                </div>`;
            });
        }

        async function saveTask() {
            const textInput = document.getElementById('task_text');
            const dateInput = document.getElementById('date_picker');
            
            if(!textInput.value || !dateInput.value) {
                return tg.showAlert("Заполните все поля!");
            }

                setTimeout(() => tg.closeScanQrPopup(), 1000);
            }
        }

        tg.ready();
        loadTasks();
    </script>
</body>
</html>
